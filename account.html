<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFC Account Window</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{
      --glass:rgba(255,255,255,.15);
      --border:rgba(255,255,255,.22);
      --text:#eff7ff;
      --muted:rgba(239,247,255,.7);
    }
    body{
      min-height:100vh;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
      /* NEW: Cloud Dashboard Background */
      background: linear-gradient(rgba(7, 19, 33, 0.65), rgba(14, 47, 82, 0.85)),
                  url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2000&auto=format&fit=crop') center/cover fixed;
    }
    .glass{
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.08));
      border:1px solid var(--border);
      backdrop-filter:blur(22px) saturate(160%);
      -webkit-backdrop-filter:blur(22px) saturate(160%);
      box-shadow:0 20px 42px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.18);
      border-radius:28px;
    }
    .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.18em;color:var(--muted);font-weight:700}
    .metric{font-size:1.9rem;font-weight:800;letter-spacing:-.03em}
    .table{color:var(--text)}
    .table thead th{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-color:rgba(255,255,255,.1)}
    .table td{border-color:rgba(255,255,255,.08)}
    .text-muted{color:var(--muted)!important}
    .list-row{padding:1rem 0;border-bottom:1px solid rgba(255,255,255,.08)}
    .list-row:last-child{border-bottom:none}
    .btn{border-radius:16px}
    .btn-outline-light{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18)}
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="glass p-4 mb-4">
      <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">
        <div>
          <div class="label mb-2">Dedicated Account Window</div>
          <h1 class="fw-bold mb-1" id="window-title">Account</h1>
          <div class="text-muted" id="window-subtitle">Live view</div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-light" onclick="window.location.reload()"><i class="fa-solid fa-rotate me-2"></i>Refresh</button>
          <button class="btn btn-outline-light" onclick="window.close()"><i class="fa-solid fa-xmark me-2"></i>Close</button>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4" id="summary-row"></div>

    <div class="glass p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center gap-3 flex-wrap mb-3">
        <div>
          <div class="label mb-1">Details</div>
          <h5 class="mb-0">Account breakdown</h5>
        </div>
      </div>
      <div id="detail-pane"></div>
    </div>

    <div class="glass p-4">
      <div class="label mb-1">Activity Feed</div>
      <h5 class="mb-3">Latest ledger events</h5>
      <div id="ledger-pane"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="account.js"></script>
</body>
</html>
