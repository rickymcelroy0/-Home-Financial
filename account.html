<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFC Account Window</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{--glass:rgba(255,255,255,.45);--line:rgba(255,255,255,.55);--ink:#183250;--muted:#60738d;--shadow:0 24px 72px rgba(30,72,129,.18)}
    body{min-height:100vh;margin:0;color:var(--ink);font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 10% 0%, rgba(99,211,255,.55), transparent 24%),radial-gradient(circle at 100% 100%, rgba(139,125,255,.22), transparent 26%),linear-gradient(160deg,#deebff,#eef6ff)}
    .glass{position:relative;background:var(--glass);border:1px solid var(--line);backdrop-filter:blur(22px) saturate(165%);-webkit-backdrop-filter:blur(22px) saturate(165%);box-shadow:var(--shadow);border-radius:28px;overflow:hidden}
    .glass::before{content:"";position:absolute;inset:0;background:linear-gradient(135deg, rgba(255,255,255,.55), rgba(255,255,255,.08) 45%, rgba(255,255,255,.2));pointer-events:none}
    .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:800}
    .mini{padding:18px;border-radius:22px;background:rgba(255,255,255,.34);border:1px solid rgba(255,255,255,.55);height:100%}
    .list-row{display:flex;justify-content:space-between;gap:14px;padding:14px 0;border-bottom:1px solid rgba(20,48,78,.08)}
    .list-row:last-child{border-bottom:0}
    .table{color:var(--ink)} .table td,.table th{background:transparent;border-color:rgba(20,48,78,.08)} .table thead th{font-size:.74rem;text-transform:uppercase;color:var(--muted);letter-spacing:.08em}
    @keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .animate-in{animation:riseIn .45s ease both}
  </style>
</head>
<body>
  <div class="container py-4 animate-in">
    <div class="glass p-4 mb-4 d-flex justify-content-between align-items-start gap-3">
      <div>
        <div class="label mb-2">Dedicated Account Window</div>
        <h2 class="fw-bold mb-1" id="window-title">Account</h2>
        <div class="text-muted" id="window-subtitle">Live view</div>
      </div>
      <button class="btn btn-outline-secondary" onclick="window.close()"><i class="fa-solid fa-xmark me-2"></i>Close</button>
    </div>

    <div class="row g-3 mb-4" id="summary-row"></div>

    <div class="glass p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Details</h5>
        <button id="action-btn" class="btn btn-primary btn-sm d-none">Action</button>
      </div>
      <div id="detail-pane"></div>
    </div>

    <div class="glass p-4">
      <h5 class="mb-3">Activity Feed</h5>
      <div id="ledger-pane"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="account.js"></script>
</body>
</html>
