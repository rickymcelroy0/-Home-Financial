<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HFC Account Window</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body{background:#f6f9fc;font-family:Inter,system-ui,sans-serif;color:#334155}
    .card{border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 10px 25px rgba(15,23,42,.05)}
    .label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:#64748b;font-weight:700}
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
      <div>
        <div class="label mb-2">Dedicated Account Window</div>
        <h2 class="fw-bold mb-1" id="window-title">Account</h2>
        <div class="text-muted" id="window-subtitle">Live view</div>
      </div>
      <button class="btn btn-outline-secondary" onclick="window.close()"><i class="fa-solid fa-xmark me-2"></i>Close</button>
    </div>

    <div class="row g-3 mb-4" id="summary-row"></div>

    <div class="card mb-4">
      <div class="card-header bg-white border-0 pt-4 px-4"><h5 class="mb-0">Details</h5></div>
      <div class="px-4 pb-4" id="detail-pane"></div>
    </div>

    <div class="card">
      <div class="card-header bg-white border-0 pt-4 px-4"><h5 class="mb-0">Activity Feed</h5></div>
      <div class="px-4 pb-4" id="ledger-pane"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="account.js"></script>
</body>
</html>
